<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Generator</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap');
  :root {
    --orange: #F47F20;
    --dark: #111111;
    --mid: rgba(255,255,255,0.05);
    --panel: rgba(255,255,255,0.045);
    --blue: #4BAFE8;
    --green: #65BA7A;
    --red: #e86b6b;
    --light: #F3F0EA;
    --muted: rgba(243,240,234,0.58);
    --border: rgba(255,255,255,0.08);
    --brand-primary: #F47F20;
    --brand-secondary: #4BAFE8;
    --brand-glow: rgba(244,127,32,0.22);
    --brand-surface: rgba(244,127,32,0.08);
    --page-bg: radial-gradient(circle at top left, rgba(244,127,32,0.18), transparent 34%), radial-gradient(circle at top right, rgba(75,175,232,0.14), transparent 30%), linear-gradient(160deg, #0f0f10 0%, #171717 45%, #0b0b0b 100%);
    --panel-bg: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.18));
    --panel-flat: rgba(255,255,255,0.045);
    --input-bg: rgba(8,8,8,0.36);
    --header-bg: rgba(8,8,8,0.72);
    --footer-muted: rgba(243,240,234,0.34);
    --control-radius: 12px;
    --panel-radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page-bg);
    color: var(--light);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex; align-items: center; gap: 12px;
    background: var(--header-bg);
    backdrop-filter: blur(18px);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    box-shadow: 0 14px 30px var(--brand-glow);
  }
  .header-title { font-weight: 700; font-size: 18px; letter-spacing: -.02em; }
  .header-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .back-link {
    font-size: 11px; font-weight: 700; color: var(--muted); text-decoration: none;
    text-transform: uppercase; letter-spacing: .1em; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: var(--control-radius); transition: all .2s;
    background: rgba(255,255,255,0.04);
  }
  .back-link:hover { color: var(--light); border-color: rgba(255,255,255,.16); background: rgba(255,255,255,0.08); }
  .brand-toggle { display: flex; gap: 6px; }
  .brand-btn {
    border: 1px solid var(--border); padding: 10px 14px; border-radius: var(--control-radius); cursor: pointer;
    font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    font-family: 'Sora', sans-serif; transition: all .2s; background: rgba(255,255,255,0.05);
  }

  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 62px); max-width: 1240px; margin: 0 auto; }
  @media(max-width:700px){
    .layout { grid-template-columns: 1fr; }
    .header { flex-wrap: wrap; padding: 14px 16px; gap: 10px; }
    .header-sub { display: none; }
    .header-title { font-size: 16px; }
    .header-right { gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .back-link, .brand-btn { padding: 8px 10px; }
  }

  .left {
    background: var(--panel-flat);
    border-right: 1px solid var(--border);
    padding: 26px 22px; display: flex; flex-direction: column; gap: 22px;
    backdrop-filter: blur(14px);
  }
  .sidebar-section {
    display: grid;
    gap: 12px;
    padding: 0 0 22px;
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
  }
  .sidebar-section:last-of-type {
    border-bottom: none;
    padding-bottom: 0;
  }
  .sidebar-section.compact {
    gap: 10px;
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); display: block; margin-bottom: 8px; }
  .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .plat-btn {
    border-radius: var(--control-radius); cursor: pointer; font-weight: 600; font-size: 11px; padding: 10px 8px;
    transition: all .2s; font-family: 'Sora', sans-serif; backdrop-filter: blur(10px);
  }
  .sidebar-select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--light);
    padding: 12px 14px;
    border-radius: var(--panel-radius);
    font-size: 12px;
    outline: none;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
  }
  .pillar-preview {
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
  }
  .pillar-preview-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--light);
  }
  .pillar-preview-copy {
    margin-top: 5px;
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
  }
  select, textarea {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--light);
    padding: 12px 14px; border-radius: var(--panel-radius); font-size: 12px; outline: none; font-family: 'Sora', sans-serif;
  }
  select { cursor: pointer; }
  textarea { resize: none; line-height: 1.5; }
  #content-topic { min-height: 132px; font-size: 13px; padding: 14px; }
  #content-topic-label { font-size: 11px; }
  .gen-btn {
    border: none; color: #fff; padding: 14px; border-radius: var(--panel-radius); cursor: pointer; font-weight: 700;
    font-size: 12px; text-transform: uppercase; letter-spacing: .08em; transition: all .2s;
    font-family: 'Sora', sans-serif;
    box-shadow: 0 18px 36px var(--brand-glow);
  }
  .gen-btn:disabled { opacity: .5; cursor: not-allowed; }

  .right { padding: 28px; overflow-y: auto; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); text-align: center; gap: 10px; }
  .empty-icon { font-size: 40px; opacity: .4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--light); }
  .empty-sub { font-size: 14px; color: var(--muted); max-width: 320px; line-height: 1.7; }

  .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.06); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result { max-width: 760px; }
  .meta-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .copy-all-btn { margin-left: auto; padding: 8px 12px; border-radius: var(--control-radius); cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; transition: all .2s; font-family: 'Sora', sans-serif; }
  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .result-action-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: var(--control-radius);
    padding: 10px 14px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
  }
  .result-action-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); }
  .result-action-btn:disabled { opacity: .55; cursor: not-allowed; }

  .block {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px; margin-bottom: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .block-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
  .editable-input,
  .editable-textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--light);
    padding: 12px 14px;
    border-radius: var(--control-radius);
    font-size: 13px;
    outline: none;
    font-family: 'Sora', sans-serif;
  }
  .editable-input { min-height: 44px; }
  .editable-textarea {
    resize: vertical;
    line-height: 1.6;
    min-height: 120px;
  }
  .editable-textarea.short { min-height: 88px; }
  .editable-stack { display: grid; gap: 12px; }
  .contact-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .contact-toggle-copy {
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
  }
  .contact-toggle-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: var(--control-radius);
    padding: 9px 12px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'Sora', sans-serif;
    white-space: nowrap;
  }
  .contact-lines { display: grid; gap: 6px; }
  .contact-line { font-size: 13px; line-height: 1.6; color: rgba(243,240,234,0.84); }
  .prompt-toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .prompt-toggle-copy {
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
  }
  .prompt-toggle-copy strong {
    color: var(--light);
    font-weight: 700;
  }
  .prompt-toggle-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: var(--control-radius);
    padding: 9px 12px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'Sora', sans-serif;
    white-space: nowrap;
  }
  .workspace-launch {
    display: grid;
    gap: 10px;
  }
  .workspace-launch-btn {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: var(--panel-radius);
    padding: 12px 14px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
  }
  .workspace-launch-btn:hover {
    background: rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.18);
  }
  .workspace-launch-btn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  .workspace-summary {
    font-size: 11px;
    line-height: 1.5;
    color: var(--muted);
  }
  .workspace-card {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    gap: 16px;
  }
  .workspace-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .workspace-card-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.02em;
  }
  .workspace-card-copy {
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
    max-width: 560px;
  }
  .workspace-top-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .workspace-ghost-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: var(--control-radius);
    padding: 10px 12px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'Sora', sans-serif;
  }

  /* ── IMAGE BLOCK ── */
  .img-block {
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    border-radius: 0;
    padding: 18px 0 0;
    margin-bottom: 10px;
  }
  .img-block-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .img-block-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: rgba(243,240,234,0.92); }
  .img-block-sub { font-size: 11px; color: rgba(243,240,234,0.72); margin-top: 2px; }

  /* Generation steps */
  .img-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .img-step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .img-step.active { color: var(--blue); }
  .img-step.done { color: var(--green); }
  .img-step.error { color: var(--red); }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; flex-shrink: 0;
  }
  .img-step.active .step-dot { background: var(--blue); animation: pulse 1s ease-in-out infinite; }
  .img-step.done .step-dot { background: var(--green); }
  .img-step.error .step-dot { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

  /* Generated image */
  .generated-image-wrap {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0,0,0,0.28);
    margin-bottom: 10px;
  }
  .generated-image-wrap img {
    width: 100%;
    display: block;
    border-radius: 8px;
  }
  .img-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .img-action-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--control-radius);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
    text-align: center;
  }
  .btn-download {
    background: rgba(101,186,122,.12);
    border: 1px solid rgba(101,186,122,.25);
    color: var(--green);
  }
  .btn-download:hover { background: rgba(101,186,122,.2); }
  .btn-regen-img {
    background: rgba(75,175,232,.1);
    border: 1px solid rgba(75,175,232,.2);
    color: var(--blue);
  }
  .btn-regen-img:hover { background: rgba(75,175,232,.18); }

  /* Prompt toggle */
  .show-prompt-btn {
    background: rgba(75,175,232,.1);
    border: 1px solid rgba(75,175,232,.2);
    color: var(--blue);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .prompt-box {
    background: rgba(8,8,8,0.36);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: rgba(243,240,234,0.76);
    line-height: 1.7;
    display: none;
  }
  .prompt-hint { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }

  /* Error */
  .img-error {
    background: rgba(232,107,107,.08);
    border: 1px solid rgba(232,107,107,.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--red);
    line-height: 1.6;
  }

  .regen-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); padding: 12px; border-radius: 14px; cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; width: 100%; margin-top: 4px; transition: all .2s; font-family: 'Sora', sans-serif; }
  .regen-btn:hover { color: var(--light); border-color: rgba(255,255,255,.15); background: rgba(255,255,255,0.08); }
  .error-box { background: rgba(224,85,85,.08); border: 1px solid rgba(224,85,85,.25); color: #E05555; padding: 10px 14px; border-radius: 7px; font-size: 12px; }

  /* ── REFERENCE IMAGE UPLOAD ── */
  .ref-upload-section {
    background: transparent;
    border: none;
    border-radius: 0;
  }
  .ref-upload-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    background: transparent;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .ref-upload-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .ref-upload-toggle { font-size: 10px; color: var(--muted); transition: transform .2s; }
  .ref-upload-toggle.open { transform: rotate(180deg); }
  .ref-upload-body { padding: 14px 0 0; display: none; }
  .ref-upload-body.open { display: block; }

  .aspect-row {
    display: flex; gap: 6px; margin-bottom: 10px;
  }
  .aspect-btn {
    flex: 1; padding: 6px 4px; border-radius: 6px; cursor: pointer;
    font-size: 10px; font-weight: 700; text-align: center;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    color: var(--muted); font-family: 'Sora', sans-serif; transition: all .2s;
    letter-spacing: .03em;
  }
  .aspect-btn.active { border-color: var(--ac,#F47F20); color: var(--ac,#F47F20); background: rgba(244,127,32,.1); }

  .drop-zone {
    border: 1.5px dashed rgba(255,255,255,.12);
    border-radius: 8px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.05); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-zone-icon { font-size: 18px; margin-bottom: 4px; }
  .drop-zone-text { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .drop-zone-text span { color: var(--light); font-weight: 600; }

  .page-footer {
    margin: 24px auto 30px;
    max-width: 1240px;
    padding: 0 28px;
    text-align: center;
    font-size: 11px;
    letter-spacing: .08em;
    color: var(--footer-muted);
  }

  .ref-thumbs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .ref-thumb {
    position: relative; width: 56px; height: 56px; border-radius: 6px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.1);
    flex-shrink: 0;
  }
  .ref-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ref-thumb-remove {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(0,0,0,.7); border: none; color: #fff;
    font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .ref-thumb-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.65); font-size: 8px; color: #ccc;
    text-align: center; padding: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  }
  .ref-library-shell {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: grid;
    gap: 10px;
  }
  .ref-library-copy {
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
  }
  .ref-library-copy strong { color: var(--light); }
  .ref-library-top,
  .ref-library-actions,
  .ref-library-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ref-library-filter-row,
  .ref-library-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .ref-library-btn,
  .ref-library-chip,
  .ref-library-card-btn,
  .ref-library-danger-btn {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--light);
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-family: 'Sora', sans-serif;
    transition: all .2s;
  }
  .ref-library-btn:disabled,
  .ref-library-card-btn:disabled,
  .ref-library-danger-btn:disabled {
    opacity: .55;
    cursor: not-allowed;
  }
  .ref-library-chip {
    padding: 7px 9px;

};

function getBrandConfig(brandId) {
  const brand = getBrand(brandId);
  const content = getBrandContent(brandId);
  return {
    name: brand.name,
    color: brand.primary,
    secondary: brand.secondary,
    background: brand.background,
    positioning: brand.positioning,
    focus: brand.focus,
    voice: brand.voice,
    keywords: brand.keywords,
    imagePromptPrefix: brand.imagePromptPrefix,
    imageStyleNotes: brand.imageStyleNotes,
    framework: content.brandKit.framework,
    story: content.brandKit.story,
    visualRule: content.brandKit.visualRule || "",
    doList: content.brandKit.doList,
    dontList: content.brandKit.dontList,
    brandBrain: content.brandBrain || null,
    websiteContent: content.websiteContent || null
  };
}

function getBrandStrategy(brandId) {
  return {
    brand: getBrand(brandId),
    content: getBrandContent(brandId)
  };
}

function formatBrainItems(items) {
  return Array.isArray(items) ? items.join(" | ") : "";
}

function cloneResult(value) {
  return value ? JSON.parse(JSON.stringify(value)) : null;
}

function isReferenceLibraryBusy(key) {
  return state.referenceLibraryBusyKeys.includes(key);
}

function isLibraryItemSelected(key) {
  return state.refImages.some((img) => img.libraryKey === key);
}

function queueReferenceLibraryBusy(key) {
  if (!isReferenceLibraryBusy(key)) {
    state.referenceLibraryBusyKeys = [...state.referenceLibraryBusyKeys, key];
  }
}

function clearReferenceLibraryBusy(key) {
  state.referenceLibraryBusyKeys = state.referenceLibraryBusyKeys.filter((entry) => entry !== key);
}

function getReferenceLibraryPrimaryTag(item) {
  return Array.isArray(item?.tags) && item.tags.length ? item.tags[0] : "";
}

function syncReferenceLibraryTagDrafts() {
  const nextDrafts = {};
  for (const item of state.referenceLibraryItems) {
    const existingDraft = state.referenceLibraryTagDrafts[item.key];
    nextDrafts[item.key] = typeof existingDraft === "string" ? existingDraft : getReferenceLibraryPrimaryTag(item);
  }
  state.referenceLibraryTagDrafts = nextDrafts;
}

function getReferenceLibraryTagDraft(key) {
  return state.referenceLibraryTagDrafts[key] || "";
}

function updateReferenceLibraryTagDraft(encodedKey, value) {
  const key = decodeURIComponent(encodedKey);
  state.referenceLibraryTagDrafts = {
    ...state.referenceLibraryTagDrafts,
    [key]: value,
  };
  renderReferenceLibrary();
}

function hasReferenceLibraryTagChange(item) {
  return getReferenceLibraryTagDraft(item.key) !== getReferenceLibraryPrimaryTag(item);
}

function resetGeneratedState() {
  state.result = null;
  state.originalResult = null;
  state.resultWarnings = [];
  state.imageB64 = null;
  state.imagePrompt = null;
  state.publishingFeedback = "";
  state.includeContactBlock = true;
}

function getBrandContact() {
  return getBrand(state.brand).contact || null;
}

function buildContactLines() {
  const contact = getBrandContact();
  if (!contact) return [];
  const lines = [];
  if (contact.supportLine) lines.push(contact.supportLine);
  if (contact.email) lines.push(`Email: ${contact.email}`);
  if (Array.isArray(contact.phones) && contact.phones.length) lines.push(`Phone: ${contact.phones.join(" / ")}`);
  if (contact.websiteLabel || contact.website) lines.push(`Website: ${contact.websiteLabel || contact.website}`);
  return lines;
}

function buildContactBlockText() {
  const contact = getBrandContact();
  if (!contact || !state.includeContactBlock) return "";
  return [contact.blockTitle || "Contact", ...buildContactLines()].filter(Boolean).join("\n");
}

function appendContactBlock(text) {
  const contactText = buildContactBlockText();
  if (!contactText) return text;
  return [text, contactText].filter(Boolean).join("\n\n");
}

function updateDraftWarnings() {
  state.resultWarnings = state.result ? evaluateGeneratedContent(state.result, state.brand) : [];
}

function updateDraftField(path, value) {
  if (!state.result) return;
  const parts = path.split(".");
  let cursor = state.result;
  for (let i = 0; i < parts.length - 1; i += 1) {
    const key = /^\d+$/.test(parts[i]) ? Number(parts[i]) : parts[i];
    cursor = cursor?.[key];
    if (cursor == null) return;
  }
  const last = parts[parts.length - 1];
  cursor[/^\d+$/.test(last) ? Number(last) : last] = value;
  updateDraftWarnings();
}

function updateDraftList(path, value) {
  const items = String(value || "")
    .split("\n")
    .map((item) => item.trim())
    .filter(Boolean);
  updateDraftField(path, items);
}

function updateDraftHashtags(value) {
  const tags = String(value || "")
    .split(/[\n, ]+/)
    .map((item) => item.trim())
    .filter(Boolean)
    .map((item) => item.replace(/^#/, ""));
  updateDraftField("hashtags", tags);
}

function restoreOriginalResult() {
  if (!state.originalResult) return;
  state.result = cloneResult(state.originalResult);
  updateDraftWarnings();
  rerenderCurrentResult();
}

function toggleContactBlock() {
  state.includeContactBlock = !state.includeContactBlock;
  rerenderCurrentResult();
}

function getEditedDraftContext() {

function setAspect(btn, size) {
  if (btn.classList.contains('active')) return;
  document.querySelectorAll('.aspect-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.aspectSize = size;
  updateAspectColour();
}

function updateAspectColour() {
  const ac = getBrandConfig(state.brand).color;
  document.querySelectorAll('.aspect-btn').forEach(b => {
    b.style.borderColor = '';
    b.style.color = '';
    b.style.background = '';
  });

    b.style.color = ac;

// ── Reference Upload Panel ──
function toggleRefUpload() {
  const body = document.getElementById('ref-upload-body');
  const icon = document.getElementById('ref-toggle-icon');
  const open = body.classList.toggle('open');
  icon.classList.toggle('open', open);
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
}

function handleFileSelect(e) {
  addFiles(Array.from(e.target.files));
  e.target.value = '';
}

function addFiles(files) {
  files.forEach(file => {
    const inferredTags = inferReferenceTagsFromFile(file, state.refImages.length);
    const reader = new FileReader();
    reader.onload = ev => {
      const entry = {
        name: file.name,
        base64: ev.target.result.split(',')[1],
        dataUrl: ev.target.result,
        type: file.type,
        source: "upload",
        tags: inferredTags,
        label: inferredTags[0] || "upload"
      };
      state.refImages.push(entry);
      renderRefThumbs();
      updateImageWorkspaceSummary();
    };
    reader.readAsDataURL(file);
  });
}

function removeRef(idx) {
  state.refImages.splice(idx, 1);
  renderRefThumbs();
  renderReferenceLibrary();
  updateImageWorkspaceSummary();
}

function renderRefThumbs() {
  const wrap = document.getElementById('ref-thumbs');
  const badge = document.getElementById('ref-count-badge');
  if (!wrap || !badge) return;
  if (!state.refImages.length) {
    wrap.innerHTML = '';
    badge.style.display = 'none';
    return;
  }
  badge.style.display = 'inline';
  badge.textContent = state.refImages.length;
  const labels = ['Device','BG','Logo','Ref'];
  wrap.innerHTML = state.refImages.map((img, i) => `
    <div class="ref-thumb">
      <img src="${img.dataUrl}" alt="ref ${i+1}" />
      <button class="ref-thumb-remove" onclick="removeRef(${i})">✕</button>
      <div class="ref-thumb-label">${esc(img.label || (img.tags && img.tags[0]) || labels[i] || 'Ref')}</div>
      ${(img.tags && img.tags.length) ? `<div class="ref-library-tag-row" style="padding:4px 6px 0">${img.tags.map((tag) => `<span class="ref-library-tag">${esc(tag)}</span>`).join('')}</div>` : ""}
    </div>`).join('');
}

function setReferenceLibraryFilter(filter) {
  state.referenceLibraryFilter = filter;
  renderReferenceLibrary();
}

function getReferenceLibraryFilterLabel() {
  return state.referenceLibraryFilter === "all" ? "All" : state.referenceLibraryFilter;
}

function getFilteredReferenceLibraryItems() {
  if (state.referenceLibraryFilter === "all") {
    return state.referenceLibraryItems;
  }
  return state.referenceLibraryItems.filter((item) => (item.tags || []).includes(state.referenceLibraryFilter));
}

function renderReferenceLibrary() {
  const brandLabel = document.getElementById("ref-library-brand-label");
  const toolbar = document.getElementById("ref-library-toolbar");
  const upload = document.getElementById("ref-library-upload");
  const status = document.getElementById("ref-library-status");
  const grid = document.getElementById("ref-library-grid");
  if (!brandLabel || !toolbar || !upload || !status || !grid) return;

  const tokenSaved = Boolean(getPublishAdminToken());
  const items = getFilteredReferenceLibraryItems();

  brandLabel.textContent = getBrand(state.brand).name;
  toolbar.innerHTML = `
    <div class="ref-library-copy" style="margin-bottom:8px">Filter saved images by tag:</div>
    <div class="ref-library-filter-row">
      <button class="ref-library-chip ${state.referenceLibraryFilter === "all" ? "active" : ""}" type="button" onclick="setReferenceLibraryFilter('all')">All</button>
      ${REFERENCE_LIBRARY_TAGS.map((tag) => `
        <button class="ref-library-chip ${state.referenceLibraryFilter === tag ? "active" : ""}" type="button" onclick="setReferenceLibraryFilter('${tag}')">${esc(tag)}</button>
      `).join("")}
    </div>`;

  upload.innerHTML = `
    <div class="ref-library-actions">
      <div style="flex:1">
        <div class="ref-library-copy" style="margin-bottom:8px">Upload, then tag each image on its card below.</div>
      </div>
      <div>
        <button class="ref-library-btn" type="button" onclick="triggerReferenceLibraryUpload()" ${tokenSaved ? "" : "disabled"}>Upload To ${esc(getBrand(state.brand).name)}</button>
        <input type="file" id="ref-library-upload-input" accept="image/*" multiple style="display:none" onchange="handleReferenceLibraryUpload(event)" />
      </div>
    </div>
    <div class="ref-library-copy">${tokenSaved ? "Choose a tag per image, then Save Tag to commit it." : "Save your internal token to upload or edit references."}</div>`;

  status.className = `ref-library-status${state.referenceLibraryError ? " error" : ""}`;
  if (state.referenceLibraryLoading) {
    status.textContent = `Loading ${getBrand(state.brand).name} references...`;
  } else if (state.referenceLibraryError) {
    status.textContent = state.referenceLibraryError;
  } else if (!state.referenceLibraryItems.length) {
    status.textContent = `No saved ${getBrand(state.brand).name} references yet. Manual uploads still work exactly as before.`;
  } else if (!items.length) {
    status.textContent = `${state.referenceLibraryItems.length} saved references available for ${getBrand(state.brand).name}, but none match the current "${getReferenceLibraryFilterLabel()}" filter.`;
  } else {
    status.textContent = `${items.length} of ${state.referenceLibraryItems.length} saved reference${state.referenceLibraryItems.length === 1 ? "" : "s"} shown for ${getBrand(state.brand).name}.`;
  }

  if (!items.length) {
    grid.innerHTML = `<div class="ref-library-empty">No saved references match the <strong>${esc(getReferenceLibraryFilterLabel())}</strong> filter yet. <button class="ref-library-btn" type="button" onclick="setReferenceLibraryFilter('all')" style="margin-left:8px">Show All</button></div>`;
    return;
  }

  grid.innerHTML = items.map((item) => {
    const selected = isLibraryItemSelected(item.key);
    const busy = isReferenceLibraryBusy(item.key);
    const draftTag = getReferenceLibraryTagDraft(item.key);
    const hasTagChange = hasReferenceLibraryTagChange(item);
    return `
      <div class="ref-library-card ${selected ? "active" : ""}">
        <img class="ref-library-image" src="${esc(item.url)}" alt="${esc(item.name)}" />
        <div class="ref-library-card-body">
          <div class="ref-library-card-name">${esc(item.name)}</div>
          <div class="ref-library-tag-row">
            ${(item.tags || []).length
              ? (item.tags || []).map((tag) => `<span class="ref-library-tag">${esc(tag)}</span>`).join("")
              : `<span class="ref-library-tag">untagged</span>`}
          </div>
          <div style="margin-top:10px">
            <label class="field-label" style="margin-bottom:6px">Tag</label>
            <select onchange="updateReferenceLibraryTagDraft('${encodeURIComponent(item.key)}', this.value)" ${tokenSaved ? "" : "disabled"}>
              <option value="">Select a tag</option>
              ${REFERENCE_LIBRARY_TAGS.map((tag) => `
                <option value="${esc(tag)}" ${draftTag === tag ? "selected" : ""}>${esc(tag)}</option>
              `).join("")}
            </select>
          </div>
          <div class="ref-library-card-actions">
            <button class="ref-library-card-btn" type="button" onclick="toggleLibraryReferenceSelection('${encodeURIComponent(item.key)}')" ${busy ? "disabled" : ""}>${selected ? "Remove" : "Use"}</button>
            <button class="ref-library-card-btn" type="button" onclick="saveReferenceLibraryTag('${encodeURIComponent(item.key)}')" ${(tokenSaved && hasTagChange && draftTag && !busy) ? "" : "disabled"}>${busy && hasTagChange ? "Saving..." : "Save Tag"}</button>
            <button class="ref-library-danger-btn" type="button" onclick="deleteReferenceLibraryItem('${encodeURIComponent(item.key)}')" ${tokenSaved ? "" : "disabled"}>${busy ? "Working..." : "Delete"}</button>
          </div>
        </div>
      </div>`;
  }).join("");
}

async function loadReferenceLibrary() {
  state.referenceLibraryLoading = true;
  state.referenceLibraryError = "";
  renderReferenceLibrary();

  try {
    const res = await fetch(`${REFERENCE_LIBRARY_URL}?brand=${encodeURIComponent(state.brand)}`);
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || "Unable to load the saved reference library.");
    }
    state.referenceLibraryItems = data.items || [];
    syncReferenceLibraryTagDrafts();
  } catch (error) {
    state.referenceLibraryItems = [];
    state.referenceLibraryTagDrafts = {};
    state.referenceLibraryError = error.message || "Unable to load the saved reference library.";
  } finally {
    state.referenceLibraryLoading = false;
    renderReferenceLibrary();
  }
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error(`Unable to read ${file.name}`));
    reader.readAsDataURL(file);
  });
}

function triggerReferenceLibraryUpload() {
  document.getElementById("ref-library-upload-input")?.click();
}

async function handleReferenceLibraryUpload(event) {
  const files = Array.from(event.target.files || []).filter((file) => file.type.startsWith("image/"));
  event.target.value = "";
  if (!files.length) return;

  const token = getPublishAdminToken();
  if (!token) {
    state.referenceLibraryError = "Save the internal publish token first, then upload library references.";
    renderReferenceLibrary();
    return;
  }

  state.referenceLibraryLoading = true;
  state.referenceLibraryError = "";
  renderReferenceLibrary();

  try {
    for (const file of files) {
      const dataUrl = await readFileAsDataUrl(file);
      const res = await fetch(REFERENCE_LIBRARY_UPLOAD_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": token,
        },
        body: JSON.stringify({
          brand: state.brand,
          filename: file.name,
          contentType: file.type,
          base64: String(dataUrl).split(",")[1],
          tags: [],
        }),
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        throw new Error(data.error || `Unable to upload ${file.name}`);
      }
    }
    state.referenceLibraryFilter = "all";
    await loadReferenceLibrary();
  } catch (error) {
    state.referenceLibraryLoading = false;
    state.referenceLibraryError = error.message || "Unable to upload the saved reference.";
    renderReferenceLibrary();
  }
}

async function saveReferenceLibraryTag(encodedKey) {
  const key = decodeURIComponent(encodedKey);
  const item = state.referenceLibraryItems.find((entry) => entry.key === key);
  const token = getPublishAdminToken();
  const nextTag = getReferenceLibraryTagDraft(key);

  if (!item) return;
  if (!token) {
    state.referenceLibraryError = "Save the internal publish token first, then update saved reference tags.";
    renderReferenceLibrary();
    return;
  }
  if (!nextTag) {
    state.referenceLibraryError = "Choose a tag before saving.";
    renderReferenceLibrary();
    return;
  }
  if (!hasReferenceLibraryTagChange(item)) {
    return;
  }

  queueReferenceLibraryBusy(key);
  state.referenceLibraryError = "";
  renderReferenceLibrary();

  try {
    const res = await fetch(REFERENCE_LIBRARY_UPDATE_TAGS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Admin-Token": token,
      },
      body: JSON.stringify({
        key,
        tags: [nextTag],
      }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || `Unable to update ${item.name}`);
    }

    state.referenceLibraryItems = state.referenceLibraryItems.map((entry) => (
      entry.key === key ? (data.item || entry) : entry
    ));
    syncReferenceLibraryTagDrafts();
    state.refImages = state.refImages.map((img) => (
      img.libraryKey === key
        ? {
            ...img,
            tags: data.item?.tags || [nextTag],
            label: data.item?.tags?.[0] || nextTag || img.label,
          }
        : img
    ));
    renderRefThumbs();
    updateImageWorkspaceSummary();
  } catch (error) {
    state.referenceLibraryError = error.message || "Unable to save the reference tag.";
  } finally {
    clearReferenceLibraryBusy(key);
    renderReferenceLibrary();
  }
}

async function toggleLibraryReferenceSelection(encodedKey) {
  const key = decodeURIComponent(encodedKey);
  if (isLibraryItemSelected(key)) {
    state.refImages = state.refImages.filter((img) => img.libraryKey !== key);
    renderRefThumbs();
    renderReferenceLibrary();
    return;
  }

  const item = state.referenceLibraryItems.find((entry) => entry.key === key);
  if (!item) return;

  queueReferenceLibraryBusy(key);
  renderReferenceLibrary();

  try {
    const res = await fetch(item.url);
    if (!res.ok) {
      throw new Error(`Unable to fetch ${item.name}`);
    }
    const blob = await res.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error(`Unable to load ${item.name}`));
      reader.readAsDataURL(blob);
    });
    state.refImages.push({
      name: item.name,
      base64: String(dataUrl).split(",")[1],
      dataUrl,
      type: item.contentType || blob.type,
      source: "library",
      libraryKey: item.key,
      tags: item.tags || [],
      label: item.tags?.[0] || "Saved"
    });
    renderRefThumbs();
    updateImageWorkspaceSummary();
  } catch (error) {
    state.referenceLibraryError = error.message || "Unable to add the saved reference.";
  } finally {
    clearReferenceLibraryBusy(key);
    renderReferenceLibrary();
  }
}

async function deleteReferenceLibraryItem(encodedKey) {
  const key = decodeURIComponent(encodedKey);
  const item = state.referenceLibraryItems.find((entry) => entry.key === key);
  if (!item) return;

  const token = getPublishAdminToken();
  if (!token) {
    state.referenceLibraryError = "Save the internal publish token first, then delete saved references.";
    renderReferenceLibrary();
    return;
  }

  if (!window.confirm(`Delete ${item.name} from the ${getBrand(state.brand).name} library?`)) {
    return;
  }

  queueReferenceLibraryBusy(key);
  state.referenceLibraryError = "";
  renderReferenceLibrary();

  try {
    const res = await fetch(REFERENCE_LIBRARY_DELETE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Admin-Token": token,
      },
      body: JSON.stringify({ key }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || `Unable to delete ${item.name}`);
    }
    state.refImages = state.refImages.filter((img) => img.libraryKey !== key);
    clearReferenceLibraryBusy(key);
    await loadReferenceLibrary();
    renderRefThumbs();
    updateImageWorkspaceSummary();
  } catch (error) {
    state.referenceLibraryError = error.message || "Unable to delete the saved reference.";
    clearReferenceLibraryBusy(key);
    renderReferenceLibrary();
  }
}

function buildSelectedReferenceSummary() {
  return state.refImages.map((img, index) => {
    const label = img.name || `Reference ${index + 1}`;
    const tags = Array.isArray(img.tags) && img.tags.length ? ` [${img.tags.join(", ")}]` : "";
    const instruction = getReferenceInstructionForTags(img.tags);
    return `- ${label}${tags}${instruction ? ` — ${instruction}` : ""}`;
  }).join("\n");
}

function inferReferenceTagsFromFile(file, index) {
  const name = String(file?.name || "").toLowerCase();
  if (/(logo|wordmark|brandmark|icon)/.test(name)) return ["logo"];
  if (/(style|guide|palette|brand|colour|color)/.test(name)) return ["style-guide"];
  if (/(device|terminal|hardware|register|pos|smartone)/.test(name)) return ["device"];
  if (/(store|shop|counter|interior|environment|scene|background)/.test(name)) return ["environment"];
  if (index === 0) return ["device"];
  if (index === 1) return ["environment"];
  if (index === 2) return ["logo"];
  return ["campaign-reference"];
}

function getReferenceInstructionForTags(tags) {
  const normalized = Array.isArray(tags) ? tags : [];
  if (normalized.includes("do-not-deviate")) {
    return "highest priority reference, treat as a visual lock";
  }
  if (normalized.includes("device")) {
    return "match the product shape, proportions, buttons, screen layout, and finish as closely as possible";
  }
  if (normalized.includes("logo")) {
    return "keep logo placement, treatment, and brand marks accurate";
  }
  if (normalized.includes("style-guide")) {
    return "follow this for palette, materials, and brand styling";
  }
  if (normalized.includes("environment")) {
    return "use mainly for setting, context, and scene realism rather than changing the product";
  }
  if (normalized.includes("campaign-reference")) {
    return "use for composition or mood only when it does not conflict with product accuracy";
  }
  return "";
}

function buildReferencePriorityGuide() {
  const selected = state.refImages || [];
  const hasTagged = selected.some((img) => Array.isArray(img.tags) && img.tags.length);
  if (!selected.length) return "";

  const lines = [
    "Reference priority rules:",
    "1. Any do-not-deviate or device reference is the source of truth for product appearance.",
    "2. Logo references control brand marks and logo treatment.",
    "3. Style-guide references control colour palette, materials, and presentation style.",
    "4. Environment references influence the setting only and must not change the product itself.",
    "5. Campaign-reference images may influence framing or mood, but only if they do not conflict with higher-priority references."
  ];

  if (!hasTagged) {
    lines.push("If the uploaded images feel ambiguous, assume the first reference is the main product reference and keep it visually faithful.");
  }

  return lines.join("\n");
}

async function refineImagePromptWithReferences(basePrompt) {
  const visionContent = [
    ...state.refImages.map((img) => ({
      type: "image_url",
      image_url: { url: `data:${img.type};base64,${img.base64}`, detail: "high" }
    })),
    {
      type: "text",
      text: `You are preparing a locked commercial image prompt for GPT Image 2.

Base prompt:
${basePrompt}

Selected references:
${buildSelectedReferenceSummary() || "- Unlabelled reference images"}

${buildReferencePriorityGuide()}

Your job:
- Identify which visual details must be preserved exactly from the references.
- Prioritise product accuracy and brand fidelity over novelty.
- When references conflict, follow the priority rules above.
- Never let an environment or mood reference override the true product appearance.
- Produce a final prompt that keeps the original marketing intent but makes the reference constraints explicit and hard to ignore.

Return structured JSON only.`
    }
  ];

  const responseFormat = {
    type: "json_schema",
    json_schema: {
      name: "reference_locked_image_prompt",
      strict: true,
      schema: {
        type: "object",
        additionalProperties: false,
        required: ["locked_elements", "allowed_flex", "final_prompt"],
        properties: {
          locked_elements: {
            type: "array",
            minItems: 2,
            items: { type: "string" }
          },
          allowed_flex: {
            type: "array",
            minItems: 1,
            items: { type: "string" }
          },
          final_prompt: { type: "string" }
        }
      }
    }
  };

  const visionToken = await getFreshTurnstileToken();
  const visionRes = await fetch(GENERATE_WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: TEXT_MODEL_ID,
      max_tokens: 900,
      response_format: responseFormat,
      turnstileToken: visionToken,
      messages: [{ role: "user", content: visionContent }]
    })
  });

  const visionData = await visionRes.json();
  if (visionData.error) {
    throw new Error(visionData.error);
  }

  const raw = visionData.content?.[0]?.text?.trim();
  if (!raw) {
    throw new Error("Reference analysis returned no prompt.");
  }

  const parsed = JSON.parse(raw);
  const locked = Array.isArray(parsed.locked_elements) ? parsed.locked_elements.filter(Boolean) : [];
  const flex = Array.isArray(parsed.allowed_flex) ? parsed.allowed_flex.filter(Boolean) : [];
  const finalPrompt = String(parsed.final_prompt || "").trim();

  if (!finalPrompt) {
    throw new Error("Reference analysis returned an empty final prompt.");
  }

  return [
    finalPrompt,
    locked.length ? `Locked reference details: ${locked.join("; ")}.` : "",
    flex.length ? `Allowed creative variation: ${flex.join("; ")}.` : "",
    "Do not invent a different product design, different logo treatment, or different hardware layout from the provided references."
  ].filter(Boolean).join("\n\n");
}

function getPublishingValidationMeta() {
  switch (state.publishingValidation) {
    case "checking":
      return {
        badgeClass: "checking",
        label: "Checking",
        copy: state.publishingValidationMessage || "Checking the saved token against the live Worker.",
      };
    case "valid":
      return {
        badgeClass: "valid",
        label: "Valid and accepted",
        copy: state.publishingValidationMessage || "The Worker accepted this token and returned the live publishing status.",
      };
    case "invalid":
      return {
        badgeClass: "invalid",
        label: "Invalid",
        copy: state.publishingValidationMessage || "The Worker rejected this token. Save the correct token, then validate again.",
      };
    case "backend_missing":
      return {
        badgeClass: "backend-missing",
        label: "Backend token not configured",
        copy: state.publishingValidationMessage || "The Worker does not currently have PUBLISH_ADMIN_TOKEN configured.",
      };
    case "connection_error":

        badgeClass: "connection-error",
        label: "Connection or network error",
        copy: state.publishingValidationMessage || "The dashboard could not confirm the token because the Worker request failed.",
      };
    default:
      return {
        badgeClass: "",
        label: "Not checked",
        copy: state.publishingValidationMessage || "Saving a token does not validate it. Use Validate connection to test it deliberately.",
      };

}

function savePublishAdminToken() {
  const value = document.getElementById("publish-admin-token")?.value?.trim() || "";
  if (value) {
    window.localStorage.setItem(PUBLISH_ADMIN_TOKEN_KEY, value);
    setPublishingValidationState("not_checked", "Token saved locally. Use Validate connection to confirm the Worker accepts it.");
  } else {
    window.localStorage.removeItem(PUBLISH_ADMIN_TOKEN_KEY);
    setPublishingValidationState("not_checked", "No token saved in this browser yet.");
  }
  state.publishingStatus = null;
  renderPublishingPanel();
  rerenderCurrentResult();
}

async function loadPublishingStatus() {
  const token = getPublishAdminToken();
  state.publishingBusy = true;
  setPublishingValidationState("checking", "Checking the saved token and current publishing configuration...");
  renderPublishingPanel();
  rerenderCurrentResult();

  if (!token) {
    state.publishingStatus = null;
    state.publishingBusy = false;
    setPublishingValidationState("not_checked", "Save the internal publish token in this browser, then validate the connection.");
    renderPublishingPanel();
    rerenderCurrentResult();
    return;
  }

  try {
    const res = await fetch(PUBLISHING_STATUS_URL, {
      headers: {
        "X-Admin-Token": token,
      },
    });
    const raw = await res.text();
    const data = raw ? JSON.parse(raw) : {};
    if (!res.ok || data.error) {
      if (data.authStatus === "invalid_token") {
        state.publishingStatus = null;
        setPublishingValidationState("invalid", "The Worker rejected this token. Save the correct token, then validate again.");
        return;
      }
      if (data.authStatus === "backend_token_missing") {
        state.publishingStatus = null;
        setPublishingValidationState("backend_missing", "The Worker does not have PUBLISH_ADMIN_TOKEN configured yet.");
        return;
      }
      throw new Error(data.error || "Unable to load publishing status");
    }
    state.publishingStatus = data;
    setPublishingValidationState("valid", "The Worker accepted this token and returned the live publishing status.");
  } catch (error) {
    state.publishingStatus = null;
    setPublishingValidationState("connection_error", error.message || "Unable to reach the publishing backend right now.");
  } finally {
    state.publishingBusy = false;
    renderPublishingPanel();
    rerenderCurrentResult();
  }
}

function getGenerationResponseFormat() {
  if (!isWebsiteChannel()) {
    return {

        schema: {
          type: "object",
          additionalProperties: false,
          required: ["headline", "body", "cta", "hashtags"],
          properties: {
            headline: { type: "string" },
            body: { type: "string" },
            cta: { type: "string" },
            hashtags: {
              type: "array",
              minItems: 3,
              maxItems: 8,
              items: { type: "string" }
            }
          }
        }
      }
    };
  }

  const schema = {
    type: "json_schema",
    json_schema: {
      name: "website_content",
      strict: true,
      schema: {
        type: "object",
        additionalProperties: false,
        required: [],

  const shape = schema.json_schema.schema;
  switch (state.postType) {
    case "Blog Post":
      shape.required = ["title", "slug", "meta_description", "intro", "outline", "sections", "cta"];
      shape.properties = {

        slug: { type: "string" },
        meta_description: { type: "string" },
        intro: { type: "string" },
        outline: { type: "array", minItems: 3, items: { type: "string" } },
        sections: {
          type: "array",
          minItems: 3,
          items: {
            type: "object",
            additionalProperties: false,
            required: ["heading", "body"],
            properties: {
              heading: { type: "string" },
              body: { type: "string" }
            }
          }
        },
        cta: { type: "string" }
      };
      break;
    case "Service Page Section":
      shape.required = ["headline", "subheadline", "body", "bullets", "cta"];
      shape.properties = {
        headline: { type: "string" },
        subheadline: { type: "string" },
        body: { type: "string" },
        bullets: { type: "array", minItems: 3, items: { type: "string" } },
        cta: { type: "string" }
      };
      break;
    case "Homepage Section":
      shape.required = ["headline", "subheadline", "body", "value_points", "cta"];
      shape.properties = {
        headline: { type: "string" },
        subheadline: { type: "string" },
        body: { type: "string" },
        value_points: { type: "array", minItems: 3, items: { type: "string" } },
        cta: { type: "string" }
      };
      break;
    case "Landing Page Copy":
      shape.required = ["headline", "subheadline", "problem", "solution", "proof_points", "cta"];
      shape.properties = {
        headline: { type: "string" },
        subheadline: { type: "string" },
        problem: { type: "string" },
        solution: { type: "string" },
        proof_points: { type: "array", minItems: 3, items: { type: "string" } },
        cta: { type: "string" }
      };
      break;
    case "FAQ Block":
      shape.required = ["intro", "faqs", "cta"];
      shape.properties = {
        intro: { type: "string" },
        faqs: {
          type: "array",
          minItems: 3,
          items: {
            type: "object",
            additionalProperties: false,
            required: ["question", "answer"],
            properties: {
              question: { type: "string" },
              answer: { type: "string" }
            }
          }
        },

    default:

        outcomes: { type: "array", minItems: 3, items: { type: "string" } },
        cta: { type: "string" }

  }

  return schema;
}

function normalizeGeneratedResult(result) {
  if (!result || typeof result !== "object") return result;
  const clone = JSON.parse(JSON.stringify(result));

  if (!isWebsiteChannel()) {
    clone.headline = String(clone.headline || "").trim();
    clone.body = String(clone.body || "").trim();
    clone.cta = String(clone.cta || "").trim();
    clone.hashtags = Array.isArray(clone.hashtags)
      ? clone.hashtags.map((tag) => String(tag || "").trim().replace(/^#/, "")).filter(Boolean)
      : [];
    return clone;
  }

  Object.keys(clone).forEach((key) => {
    if (typeof clone[key] === "string") {
      clone[key] = clone[key].trim();
    }
  });
  return clone;
}

function evaluateGeneratedContent(result, brandId) {
  const warnings = [];
  const serialised = JSON.stringify(result || {});
  const lower = serialised.toLowerCase();

  if (/\b(guaranteed|risk-free|best\b|cheapest|fastest|always)\b/i.test(serialised)) {
    warnings.push("Review absolute or guaranteed claims before publishing. Keep the copy commercially confident without unsupported superlatives.");
  }

  if (brandId === "smartone") {
    const sensitiveClaim = /(lower transaction rates|lower operating costs|save money|cost savings|cheaper rates)/i.test(serialised);
    const hasQualifier = /\b(can|could|may|might|depending|potential|where applicable|when suitable)\b/i.test(serialised);
    if (sensitiveClaim && !hasQualifier) {
      warnings.push("SmartOne cost or transaction-rate claims should be qualified. Add context such as 'can', 'may', or 'depending on merchant setup' before publishing.");
    }
    if (!/(merchant|checkout|card|payment|receipt|counter|till|fiscal)/i.test(serialised)) {
      warnings.push("This SmartOne draft reads a little generic. Consider adding stronger merchant, checkout, or fiscal-payment context.");
    }
  }

  if (brandId === "zerobubble" && !/(pos|stock|checkout|retail|hospitality|reporting|inventory|support|integration)/i.test(serialised)) {
    warnings.push("This ZeroBubble draft may be too broad. Consider reinforcing the operational angle with POS, stock, reporting, integrations, or support language.");
  }

  if (!isWebsiteChannel()) {
    const hashtagCount = Array.isArray(result?.hashtags) ? result.hashtags.length : 0;
    if (hashtagCount < 3 || hashtagCount > 8) {
      warnings.push("Keep social hashtags tight. Three to eight relevant tags is the current target range for this generator.");
    }
  }

  if (!String(result?.cta || "").trim()) {
    warnings.push("The CTA is missing. Add a clear next step before publishing.");
  }

  if (lower.includes("lorem ipsum")) {
    warnings.push("Placeholder copy was detected. Replace it before using this draft.");
  }

  return warnings;
}

function buildQualityReviewMarkup() {
  if (!state.resultWarnings?.length) return "";
  return `

async function generate(options = {}) {
  const contentTopic = getContentPromptValue();
  const imageTopic = getImagePromptValue();
  const b = getBrandConfig(state.brand);
  const strategy = getBrandStrategy(state.brand);
  const pillar = getActivePillars().find(p=>p.id===state.pillar) || getActivePillars()[0];
  const btn = document.getElementById("gen-btn");
  const variationSeed = getRandom(VARIATION_SEEDS);
  const regenerateFromEdited = Boolean(options.regenerateFromEdited && state.result);

  document.getElementById("error-box").style.display = "none";
  btn.disabled = true;
  btn.textContent = regenerateFromEdited ? "Refining..." : "Generating...";
  state.mainPanelMode = "loading";

  document.getElementById("right").innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner" style="border-top-color:${b.color}"></div>
      <div style="color:#555;font-size:13px">${isWebsiteChannel() ? "Writing your website content..." : "Writing your post..."}</div>
    </div>`;
  scrollRightToTop();

  const prompt = isWebsiteChannel()
    ? buildWebsitePrompt(b, pillar, contentTopic, variationSeed, { regenerateFromEdited })
    : buildCampaignPrompt(b, pillar, contentTopic, variationSeed, { regenerateFromEdited });

  try {
    // Step 1: Generate caption
    const captionToken = await getFreshTurnstileToken();
    const res = await fetch(GENERATE_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: TEXT_MODEL_ID,
        // Website content (esp. Blog Post) is long-form structured JSON; the 1000-token
        // cap truncated it mid-string. Give the website path more headroom; social posts
        // stay lean. Budget covers reasoning + output on the gpt-5.5 Responses API.
        max_tokens: isWebsiteChannel() ? 4000 : 1000,
        reasoning: { effort: "low" },
        response_format: getGenerationResponseFormat(),
        turnstileToken: captionToken,
        messages: [{ role:"user", content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const text = data.content?.[0]?.text || "";
    const clean = text.replace(/```json|```/g,"").trim();
    const result = normalizeGeneratedResult(JSON.parse(clean));
    state.originalResult = cloneResult(result);
    state.result = cloneResult(result);
    updateDraftWarnings();
    state.includeContactBlock = true;

    if (isWebsiteChannel()) {
      state.imagePrompt = null;
      state.imageB64 = null;
      renderResult(result, b, pillar);
    } else {
      const { prompt: imgPrompt } = buildCurrentImagePrompt({ regenerateFromEdited });
      renderResult(result, b, pillar);
      await generateImage(imgPrompt, b);
    }

  } catch(e) {
    document.getElementById("right").innerHTML = `<div style="padding:24px"><div class="error-box">Generation failed: ${esc(e.message)}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = isWebsiteChannel() ? "Generate Website Content" : "Generate Content";
}

async function generateImage(imgPrompt, b) {
  const imgBlock = document.getElementById("img-block");
  if (!imgBlock) return;

  const hasRef = state.refImages.length > 0;

  imgBlock.innerHTML = `
    <div class="img-block-header">
      <div>
        <div class="img-block-title">Generated Image</div>
        <div class="img-block-sub">${IMAGE_MODEL_LABEL} · ${state.aspectSize}${hasRef ? ' · Reference-guided' : ''}</div>
      </div>
    </div>
    <div class="img-steps">
      <div class="img-step done" id="step-caption"><span class="step-dot"></span>Caption generated</div>
      <div class="img-step ${hasRef ? 'active' : 'done'}" id="step-vision"><span class="step-dot"></span>${hasRef ? 'Analysing reference images…' : 'Image prompt ready'}</div>
      <div class="img-step ${hasRef ? '' : 'active'}" id="step-image"><span class="step-dot"></span>Generating image with ${IMAGE_MODEL_LABEL}</div>
    </div>`;

  let finalPrompt = imgPrompt;

  // If ref images are provided, turn them into explicit constraints before generation.
  if (hasRef) {
    try {
      finalPrompt = await refineImagePromptWithReferences(imgPrompt);
    } catch(e) { /* fallback to base prompt */ }

    const stepVision = document.getElementById("step-vision");
    const stepImage = document.getElementById("step-image");
    if (stepVision) { stepVision.className = 'img-step done'; }
    if (stepImage) stepImage.className = 'img-step active';
    state.imagePrompt = finalPrompt;
  }

  await new Promise(r => setTimeout(r, 300));

  try {
    const imageToken = await getFreshTurnstileToken();
    const imgRes = await fetch(IMAGE_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: finalPrompt,
        size: state.aspectSize,
        quality: "high",
        model: IMAGE_MODEL_ID,
        turnstileToken: imageToken,
        references: state.refImages.map((img) => ({
          name: img.name || "reference-image",
          contentType: img.type || "image/png",
          base64: img.base64,
          tags: Array.isArray(img.tags) ? img.tags : [],
        })),
      })
    });

    const imgData = await imgRes.json();

    if (imgData.error) throw new Error(imgData.error);

    const b64 = imgData.data?.[0]?.b64_json;
    if (!b64) throw new Error("No image data returned");

    state.imageB64 = b64;
    const src = `data:image/png;base64,${b64}`;

    const stepImage = document.getElementById("step-image");
    if (stepImage) { stepImage.className = 'img-step done'; }

    const block = document.getElementById("img-block");
    if (!block) return;

    // Build aspect label
    const aspectLabel = document.querySelector('.aspect-btn.active')?.dataset?.ratio || state.aspectSize;

    block.innerHTML = `
      <div class="img-block-header">
        <div>
          <div class="img-block-title">Generated Image</div>
          <div class="img-block-sub">${IMAGE_MODEL_LABEL} High · ${aspectLabel}${hasRef ? ' · Reference-guided' : ''} · Click to view full size</div>
        </div>
        <button class="show-prompt-btn" onclick="toggleImgPrompt()">View Prompt</button>
      </div>
      <div class="generated-image-wrap">
        <img src="${src}" alt="Generated marketing image" onclick="window.open(this.src)" style="cursor:zoom-in" />
      </div>
      <div class="img-actions">
        <button class="img-action-btn btn-download" onclick="downloadImage()">Save Image</button>
        <button class="img-action-btn btn-regen-img" onclick="regenImage()">Regenerate</button>
      </div>
      <div class="prompt-box" id="img-prompt-box">
        <div class="prompt-hint">Image prompt used:</div>
        ${esc(state.imagePrompt)}
      </div>`;

  } catch(err) {
    const block = document.getElementById("img-block");
    if (!block) return;
    block.innerHTML = `
      <div class="img-block-header">
        <div>
          <div class="img-block-title">Generated Image</div>
          <div class="img-block-sub">${IMAGE_MODEL_LABEL}</div>
        </div>
        <button class="show-prompt-btn" onclick="toggleImgPrompt()">View Prompt</button>
      </div>
      <div class="img-error">
        Image generation failed: ${esc(err.message)}<br>
        <span style="color:#666;font-size:11px;margin-top:4px;display:block">You can still use the caption above.</span>
      </div>
      <div style="margin-top:10px">
        <button class="img-action-btn btn-regen-img" onclick="regenImage()" style="width:100%">Retry Image Generation</button>
      </div>
      <div class="prompt-box" id="img-prompt-box">
        <div class="prompt-hint">Image prompt used:</div>
        ${esc(state.imagePrompt)}
      </div>`;
  }
}

        <div class="publish-action-row">
          <button class="publish-action-btn" onclick="publishCurrentToMeta('facebook')" ${canFacebook ? "" : "disabled"}>Publish to Facebook</button>
          <button class="publish-action-btn" onclick="publishCurrentToMeta('instagram')" ${canInstagram ? "" : "disabled"}>Publish to Instagram</button>
        </div>
        <div class="publish-feedback">${esc(getPublishFeedbackText("meta"))}</div>
      </div>`;
  }

  return "";
}

function getPublishFeedbackText(kind) {
  if (state.publishingFeedback) return state.publishingFeedback;
  if (!getPublishAdminToken()) {
    return "Save the internal publish token, then validate the connection to unlock publishing.";
  }
  if (!isPublishingValidated()) {
    return getPublishingValidationMeta().copy;
  }
  if (kind === "shopify") {
    const shopifyIssues = state.publishingStatus?.shopify?.issues || [];
    return shopifyIssues.length ? `Shopify is blocked right now.\n${shopifyIssues[0]}` : "Shopify publishing is available here once the Worker is configured.";
  }
  const meta = state.publishingStatus?.meta;
  const metaIssue = !meta?.facebookReady
    ? meta?.facebookIssues?.[0]
    : meta?.instagramIssues?.[0];
  return metaIssue ? `Meta is partially blocked right now.\n${metaIssue}` : "Facebook can publish the generated image directly. Instagram currently also needs a public image URL on the Worker side.";
}

function getSocialPublishCaption(includeContact = state.includeContactBlock) {
  const r = state.result || {};
  const hashtags = (r.hashtags || []).map((tag) => `#${String(tag).replace(/^#/, "")}`).join(" ");
  const base = [r.headline || "", r.body || "", r.cta || "", hashtags].filter(Boolean).join("\n\n");
  return includeContact ? appendContactBlock(base) : base;
}

function rerenderCurrentResult() {
  if (!state.result) return;
  const b = getBrandConfig(state.brand);
  const pillar = getActivePillars().find((entry) => entry.id === state.pillar) || getActivePillars()[0];
  renderResult(state.result, b, pillar);
}

function getWebsiteListPath(label) {
  switch (label) {
    case "Key Benefits":
      return "bullets";
    case "Value Points":
      return "value_points";
    case "Proof Points":
      return "proof_points";
    case "Outcomes":
      return "outcomes";
    default:
      return "outline";
  }
}

function getShopifyPublishPayload() {
  const payload = cloneResult(state.result) || {};
  const contactText = buildContactBlockText();
  if (!contactText) return payload;

  switch (state.postType) {
    case "Blog Post":
      payload.sections = [...(payload.sections || []), { heading: getBrandContact()?.blockTitle || "Contact", body: contactText }];
      return payload;
    case "Landing Page Copy":
      payload.solution = [payload.solution || "", contactText].filter(Boolean).join("\n\n");
      return payload;
    case "FAQ Block":
      payload.faqs = [...(payload.faqs || []), { question: getBrandContact()?.blockTitle || "Contact", answer: contactText }];
      return payload;
    case "Case Study":
      payload.solution = [payload.solution || "", contactText].filter(Boolean).join("\n\n");
      return payload;
    default:
      payload.body = [payload.body || "", contactText].filter(Boolean).join("\n\n");
      return payload;
  }
}

async function publishCurrentToShopify() {
  const token = getPublishAdminToken();
  if (!token || !state.result) return;

  state.publishingBusy = true;
  state.publishingFeedback = "Publishing to Shopify...";
  rerenderCurrentResult();

  try {
    const res = await fetch(SHOPIFY_PUBLISH_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Admin-Token": token,
      },
      body: JSON.stringify({
        brand: state.brand,
        contentType: state.postType,
        payload: getShopifyPublishPayload(),
      }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || "Shopify publish failed");
    }
    const result = data.result || {};
    state.publishingFeedback = `Published to Shopify.\n${result.title || ""}${result.url ? `\n${result.url}` : ""}`.trim();
  } catch (error) {
    state.publishingFeedback = `Shopify publish failed.\n${error.message}`;
  } finally {
    state.publishingBusy = false;
    rerenderCurrentResult();
  }
}

async function publishCurrentToMeta(target) {
  const token = getPublishAdminToken();
  if (!token || !state.result) return;

  state.publishingBusy = true;
  state.publishingFeedback = `Publishing to ${target === "facebook" ? "Facebook" : "Instagram"}...`;
  rerenderCurrentResult();

  try {
    const res = await fetch(META_PUBLISH_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Admin-Token": token,
      },
      body: JSON.stringify({
        target,
        brand: state.brand,
        platform: state.platform,
        postType: state.postType,
        caption: getSocialPublishCaption(),
        imageBase64: state.imageB64,
      }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      throw new Error(data.error || "Meta publish failed");
    }
    state.publishingFeedback = `Published to ${target === "facebook" ? "Facebook" : "Instagram"}.\nPost ID: ${data.result?.postId || data.result?.publishId || data.result?.id || "created"}`;
  } catch (error) {
    state.publishingFeedback = `${target === "facebook" ? "Facebook" : "Instagram"} publish failed.\n${error.message}`;
  } finally {
    state.publishingBusy = false;
    rerenderCurrentResult();
  }
}

  if (state.imageB64) {
    const src = `data:image/png;base64,${state.imageB64}`;

}

function copyAll() {
  if (!state.result) return;
  const r = state.result;
  const text = isWebsiteChannel() ? formatWebsiteCopy(r) : getSocialPublishCaption();
  navigator.clipboard.writeText(text);
  const btn = document.getElementById("copy-btn");
  btn.textContent = "✓ Copied!";
  btn.style.color = "var(--green)";
  btn.style.borderColor = "var(--green)";
  setTimeout(()=>{ btn.textContent="Copy All"; btn.style.color="#666"; btn.style.borderColor="rgba(255,255,255,.08)"; }, 2000);
}

function formatWebsiteCopy(r) {
  const withContact = (parts) => {
    const contactText = buildContactBlockText();
    return [...parts, ...(contactText ? ["", contactText] : [])].join("\n");
  };
  switch (state.postType) {
    case "Blog Post":
      return withContact([
        `Title: ${r.title || ""}`,
        `Slug: ${r.slug || ""}`,
        `Meta Description: ${r.meta_description || ""}`,
        "",
        r.intro || "",
        "",
        ...(r.outline || []).map((item, index) => `${index + 1}. ${item}`),
        "",
        ...(r.sections || []).flatMap((section) => [section.heading || "", section.body || "", ""]),
        `CTA: ${r.cta || ""}`
      ]);
    case "FAQ Block":
      return withContact([
        r.intro || "",
        "",
        ...(r.faqs || []).flatMap((faq) => [`Q: ${faq.question || ""}`, `A: ${faq.answer || ""}`, ""]),
        `CTA: ${r.cta || ""}`
      ]);
    case "Case Study":
      return withContact([
        `Title: ${r.title || ""}`,
        `Client Type: ${r.client_type || ""}`,
        "",
        `Challenge: ${r.challenge || ""}`,
        "",
        `Solution: ${r.solution || ""}`,
        "",
        "Outcomes:",
        ...(r.outcomes || []).map((item) => `- ${item}`),
        "",
        `CTA: ${r.cta || ""}`
      ]);
    case "Landing Page Copy":
      return withContact([
        r.headline || "",
        r.subheadline || "",
        "",
        `Problem: ${r.problem || ""}`,
        "",
        `Solution: ${r.solution || ""}`,
        "",
        "Proof Points:",
        ...(r.proof_points || []).map((item) => `- ${item}`),
        "",
        `CTA: ${r.cta || ""}`
      ]);
    case "Homepage Section":
      return withContact([
        r.headline || "",
        r.subheadline || "",
        "",
        r.body || "",
        "",
        "Value Points:",
        ...(r.value_points || []).map((item) => `- ${item}`),
        "",
        `CTA: ${r.cta || ""}`
      ]);
    default:
      return withContact([
        r.headline || "",
        r.subheadline || "",
        "",
        r.body || "",
        "",
        "Key Benefits:",
        ...(r.bullets || []).map((item) => `- ${item}`),
        "",
        `CTA: ${r.cta || ""}`
      ]);
  }
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
